# QFL Production Docker Compose
# Uses onesport-admin (nginx) as reverse proxy via shared 1sport_intranet network
# QFL frontend/backend/minio join 1sport_intranet so nginx can reach them by container name

services:
  # =================== FRONTEND (Next.js) ===================
  frontend:
    image: ghcr.io/nurali017/qfl-frontend:latest
    container_name: qfl-frontend
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://qfl-backend:8000/api/v1
      - API_REWRITE_DESTINATION=http://qfl-backend:8000
      - NEXT_PUBLIC_CUP_DRAW_ENABLED=${NEXT_PUBLIC_CUP_DRAW_ENABLED:-true}
    networks:
      - qfl-network
      - 1sport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =================== ADMIN (Next.js) ===================
  admin:
    image: ghcr.io/nurali017/qfl-admin:latest
    container_name: qfl-admin
    environment:
      - NODE_ENV=production
      - API_REWRITE_DESTINATION=http://qfl-backend:8000
    networks:
      - qfl-network
      - 1sport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/admin"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =================== BACKEND (FastAPI + Gunicorn) ===================
  backend:
    image: ghcr.io/nurali017/qfl-backend:latest
    container_name: qfl-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@qfl-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://qfl-redis:6379/0
      - MINIO_ENDPOINT=qfl-minio:9000
      - MINIO_PUBLIC_ENDPOINT=${SITE_DOMAIN}/storage
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-qfl-files}
      - MINIO_SECURE=false
      - CURRENT_SEASON_ID=${DEFAULT_SEASON_ID:-200}
      - ALLOWED_ORIGINS=https://${SITE_DOMAIN}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CUP_DRAW_ENABLED=${CUP_DRAW_ENABLED:-true}
      - SOTA_ENABLED=${SOTA_ENABLED:-true}
      - SOTA_API_EMAIL=${SOTA_API_EMAIL:-}
      - SOTA_API_PASSWORD=${SOTA_API_PASSWORD:-}
      - SOTA_API_BASE_URL=${SOTA_API_BASE_URL:-https://sota.id/api}
      - SYNC_SEASON_IDS=${SYNC_SEASON_IDS:-61,85,71,80,84,200}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_NOTIFICATIONS_ENABLED=${TELEGRAM_NOTIFICATIONS_ENABLED:-false}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - TICKET_SEARCH_ENABLED=${TICKET_SEARCH_ENABLED:-false}
      - DATABASE_POOL_SIZE=5
      - DATABASE_MAX_OVERFLOW=10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qfl-network
      - 1sport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =================== DATABASE (PostgreSQL) ===================
  db:
    image: postgres:15-alpine
    container_name: qfl-db
    command: >-
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c checkpoint_timeout=15min
      -c max_wal_size=2GB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qfl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =================== REDIS ===================
  redis:
    image: redis:7-alpine
    container_name: qfl-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - qfl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =================== MINIO (Object Storage) ===================
  minio:
    image: minio/minio:latest
    container_name: qfl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - /mnt/data/minio:/data
    networks:
      - qfl-network
      - 1sport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5

  # =================== CELERY WORKER ===================
  celery_worker:
    image: ghcr.io/nurali017/qfl-backend:latest
    container_name: qfl-celery-worker
    command: celery -A app.tasks worker -l info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@qfl-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://qfl-redis:6379/0
      - MINIO_ENDPOINT=qfl-minio:9000
      - MINIO_PUBLIC_ENDPOINT=${SITE_DOMAIN}/storage
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-qfl-files}
      - MINIO_SECURE=false
      - CURRENT_SEASON_ID=${DEFAULT_SEASON_ID:-200}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CUP_DRAW_ENABLED=${CUP_DRAW_ENABLED:-true}
      - SOTA_ENABLED=${SOTA_ENABLED:-true}
      - SOTA_API_EMAIL=${SOTA_API_EMAIL:-}
      - SOTA_API_PASSWORD=${SOTA_API_PASSWORD:-}
      - SOTA_API_BASE_URL=${SOTA_API_BASE_URL:-https://sota.id/api}
      - SYNC_SEASON_IDS=${SYNC_SEASON_IDS:-61,85,71,80,84,200}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_NOTIFICATIONS_ENABLED=${TELEGRAM_NOTIFICATIONS_ENABLED:-false}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - TICKET_SEARCH_ENABLED=${TICKET_SEARCH_ENABLED:-false}
      - DATABASE_POOL_CLASS=null
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qfl-network
    restart: unless-stopped

  # =================== CELERY BEAT (Scheduler) ===================
  celery_beat:
    image: ghcr.io/nurali017/qfl-backend:latest
    container_name: qfl-celery-beat
    command: celery -A app.tasks beat -l info --pidfile=/tmp/celerybeat.pid
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@qfl-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://qfl-redis:6379/0
      - CURRENT_SEASON_ID=${DEFAULT_SEASON_ID:-200}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CUP_DRAW_ENABLED=${CUP_DRAW_ENABLED:-true}
      - SOTA_ENABLED=${SOTA_ENABLED:-true}
      - SOTA_API_EMAIL=${SOTA_API_EMAIL:-}
      - SOTA_API_PASSWORD=${SOTA_API_PASSWORD:-}
      - SOTA_API_BASE_URL=${SOTA_API_BASE_URL:-https://sota.id/api}
      - SYNC_SEASON_IDS=${SYNC_SEASON_IDS:-61,85,71,80,84,200}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - TICKET_SEARCH_ENABLED=${TICKET_SEARCH_ENABLED:-false}
      - DATABASE_POOL_CLASS=null
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qfl-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  qfl-network:
    driver: bridge
  1sport-network:
    external: true
    name: 1sport_intranet
