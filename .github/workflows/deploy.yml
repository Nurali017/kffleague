name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/debian/qfl

            echo "=== Pulling infra ==="
            git fetch origin main && git reset --hard origin/main

            echo "=== Pulling backend image ==="
            docker pull ghcr.io/nurali017/qfl-backend:latest

            echo "=== Starting infrastructure ==="
            docker compose -f docker-compose.prod.yml up -d db redis minio
            sleep 5

            echo "=== Running migrations ==="
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            echo "=== Restarting backend ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            echo "=== Waiting for backend health ==="
            set +e
            HEALTHY=false
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T backend \
                curl -sf http://localhost:8000/health > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "Backend healthy after ${i} checks"
                HEALTHY=true
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 3
            done
            set -e
            if [ "$HEALTHY" = "false" ]; then
              echo "Backend health check failed!"
              docker compose -f docker-compose.prod.yml logs --tail=20 backend
              exit 1
            fi

            echo "=== Restarting workers ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps celery_worker celery_beat

            echo "=== Updating nginx ==="
            cp nginx/conf.d/default.conf /home/debian/1sport/qfl-nginx/kffleague.kz.conf
            docker exec onesport-admin nginx -t && docker exec onesport-admin nginx -s reload

            echo "=== Cleanup ==="
            docker image prune -f &

            echo "=== Done ==="
            docker compose -f docker-compose.prod.yml ps
