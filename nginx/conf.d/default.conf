# QFL (kffleague.kz) — nginx server block
# Included by onesport-admin nginx via /etc/nginx/qfl/kffleague.kz.conf

# Rate limiting
limit_req_zone $binary_remote_addr zone=qfl_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=qfl_general:10m rate=50r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name kffleague.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kffleague.kz;

    # SSL (Let's Encrypt via shared certbot)
    ssl_certificate /etc/nginx/ssl/live/kffleague.kz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/kffleague.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:QFL_SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 50M;

    # =================== API Backend ===================
    location /api/ {
        limit_req zone=qfl_api burst=60 nodelay;

        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =================== WebSocket (Live Match) ===================
    location /api/v1/live/ws/ {
        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =================== MinIO Storage ===================
    location /storage/ {
        set $qfl_minio qfl-minio;
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://$qfl_minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires off;
        add_header Cache-Control "public, no-cache";

        limit_except GET HEAD {
            deny all;
        }
    }

    # =================== Next.js Static ===================
    location /_next/static/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /images/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /locales/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
    }

    # =================== Admin Panel ===================
    location /admin {
        set $qfl_admin qfl-admin;
        proxy_pass http://$qfl_admin:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/_next/static/ {
        set $qfl_admin qfl-admin;
        proxy_pass http://$qfl_admin:3001;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # =================== Health ===================
    location /health {
        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # =================== Frontend (catch-all) ===================
    location / {
        limit_req zone=qfl_general burst=100 nodelay;

        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
