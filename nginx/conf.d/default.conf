# QFL (kffleague.kz) — nginx server block
# Included by onesport-admin nginx via /etc/nginx/qfl/kffleague.kz.conf

# Rate limiting
limit_req_zone $binary_remote_addr zone=qfl_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=qfl_general:10m rate=50r/s;

proxy_cache_path /tmp/minio_cache levels=1:2 keys_zone=minio_cache:10m max_size=512m inactive=24h use_temp_path=off;
proxy_cache_path /tmp/frontend_cache levels=1:2 keys_zone=frontend_cache:10m max_size=256m inactive=10m use_temp_path=off;
proxy_cache_path /tmp/api_cache levels=1:2 keys_zone=api_cache:10m max_size=128m inactive=5m use_temp_path=off;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name kffleague.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kffleague.kz;

    # SSL (Let's Encrypt via shared certbot)
    ssl_certificate /etc/nginx/ssl/live/kffleague.kz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/kffleague.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:QFL_SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 50M;

    # =================== API Backend (cached read-only endpoints) ===================
    location ~ ^/api/v1/(seasons/\d+/(table|teams|player-stats|team-stats|attendance)|news\?|championships|partners|cities) {
        limit_req zone=qfl_api burst=60 nodelay;
        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        proxy_cache api_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 15s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_key "$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # =================== API Backend ===================
    location /api/ {
        limit_req zone=qfl_api burst=60 nodelay;

        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 4 32k;
        proxy_next_upstream error timeout http_502;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 5s;
    }

    # =================== WebSocket (Live Match) ===================
    location /api/v1/live/ws/ {
        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =================== MinIO Storage ===================
    location /storage/ {
        set $qfl_minio qfl-minio;
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://$qfl_minio:9000;
        proxy_set_header Host qfl-minio;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect http://qfl-minio:9000/ https://kffleague.kz/storage/;
        proxy_redirect http://qfl-minio:9000/ /storage/;

        # Proxy cache — shields MinIO from direct hits
        proxy_cache minio_cache;
        proxy_cache_valid 200 24h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_key $uri;

        proxy_hide_header Cache-Control;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;

        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        limit_except GET HEAD {
            deny all;
        }
    }

    # =================== Next.js Static ===================
    location /_next/static/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /images/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /locales/ {
        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
    }

    # =================== Admin API (proxy to backend) ===================
    location /admin/admin-api/ {
        limit_req zone=qfl_api burst=60 nodelay;

        set $qfl_backend qfl-backend;
        rewrite ^/admin/admin-api/(.*) /api/v1/admin/$1 break;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =================== Admin Panel ===================
    location /admin {
        set $qfl_admin qfl-admin;
        proxy_pass http://$qfl_admin:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/_next/static/ {
        set $qfl_admin qfl-admin;
        proxy_pass http://$qfl_admin:3001;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # =================== Health ===================
    location /health {
        set $qfl_backend qfl-backend;
        proxy_pass http://$qfl_backend:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # =================== Frontend (catch-all) ===================
    location / {
        limit_req zone=qfl_general burst=100 nodelay;

        set $qfl_frontend qfl-frontend;
        proxy_pass http://$qfl_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache frontend_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_background_update on;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
